---
configuration:
  server_url:
    name: Server URL
    description: >-
      The public URL Tailscale clients use to reach this Headscale server
      (e.g. https://headscale.example.com). Must be reachable from outside.
  log_level:
    name: Log level
    description: Verbosity of the Headscale logs.
  ipv4_prefix:
    name: IPv4 prefix
    description: >-
      IPv4 range to allocate tailnet addresses from. Must be a subnet of
      100.64.0.0/10.
  ipv6_prefix:
    name: IPv6 prefix
    description: >-
      IPv6 range to allocate tailnet addresses from. Must be a subnet of
      fd7a:115c:a1e0::/48.
  address_allocation:
    name: IP allocation strategy
    description: >-
      How tailnet IPs are assigned to new nodes: sequential (next free IP) or
      random.
  ephemeral_node_inactivity_timeout:
    name: Ephemeral node inactivity timeout
    description: Time before an inactive ephemeral node is deleted (e.g. 30m).
  policy_mode:
    name: ACL policy mode
    description: >-
      Where ACL policies are stored: "file" (HuJSON file, see ACL policy
      path) or "database" (managed via the Headscale API/CLI).
  policy_path:
    name: ACL policy path
    description: >-
      Optional path to a HuJSON ACL policy file, e.g.
      /etc/headscale/acl.hujson (place the file in the add-on configuration
      folder). Only used when ACL policy mode is "file".
  oidc_enabled:
    name: Enable OpenID Connect
    description: >-
      Authenticate users against an OpenID Connect identity provider. When
      enabled, issuer, client ID and client secret are required.
  oidc_issuer:
    name: OIDC issuer URL
    description: OpenID Connect issuer URL from the identity provider.
  oidc_client_id:
    name: OIDC client ID
    description: Client ID from the identity provider.
  oidc_client_secret:
    name: OIDC client secret
    description: Client secret generated by the identity provider.
  oidc_expiry:
    name: OIDC session expiry
    description: >-
      How long a node stays authenticated before needing to reauthenticate
      (e.g. 180d). Use 0 for no expiry. Leave empty for the Headscale default.
  oidc_scope:
    name: OIDC scopes
    description: OIDC scopes to request; always include "openid".
  oidc_pkce_enabled:
    name: OIDC PKCE
    description: Enable PKCE (Proof Key for Code Exchange) for the OIDC flow.
  headplane_enabled:
    name: Headplane dashboard
    description: >-
      Run the bundled Headplane web UI (port 3000, path /admin) to manage
      Headscale: machines, users, ACLs, DNS settings. Log in with a Headscale
      API key ("headscale apikeys create" from the add-on terminal).
  headplane_base_url:
    name: Headplane base URL
    description: >-
      Public URL used to reach the Headplane dashboard (used for cookies and
      redirects), e.g. http://homeassistant.local:3000 or the reverse-proxy
      URL in front of it.
